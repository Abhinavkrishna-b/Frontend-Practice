<html>
    <head> 
        <title>Text</title>
        <style>
            p{
                font-family:Arial;
                text-align:center;
                margin-top:0px;
                margin-bottom:0px;
            }
            .new{
                color:red;
                font-size: 16px;
                margin-bottom:7px;
            }
            .Pro{
                font-weight:bold;
                font-size:24px;
                margin-bottom:9px;
            }
            .title{
                font-size:30px;
                font-weight:bold;
                margin-bottom:8px;
            }
            .price{
                opacity:0.7;
                margin-bottom:10px;
            }
            button{
                margin-left:825px;
                background-color:rgb(70, 70, 193);
                color:white;
                border:none;
                border-radius:15px;
                padding:5px;
                padding-right:8px;
                padding-left:8px;
            }
        </style>
    </head>
    <body>

        <p class="new">New</p>
        <p class="Pro">MacBook Pro</p>
        <p class="title">SuperCharged for Pros!!!</p>
        <p class="price">From $499</p>
        <button>Buy</button>

        <marquee>Marquee tag is used to create this animation</marquee>
    </body>
</html>
