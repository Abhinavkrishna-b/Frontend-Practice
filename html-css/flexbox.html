<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox</title>
        <style>
            .layout{
                display: flex;
                flex-direction:row;
                height:50px;
                justify-content: space-between;
                align-items: center;
                background-color:purple;
            }
            .search{
                border:1px solid grey;
                width: 75%;
                margin-left: 5%;
                border-radius: 20px;
                padding: 5px;
            }

            .left-side{
                width:250px;
                margin-right:10px;
                padding: 10px;
            }
            .center{
                flex:1;
                margin-right:10px;
                padding: 5px;
            }
            .right-side{
                width:250px;
                margin-left:10px;
                padding: 10px;
            }
            p{
                color:white;
                font-family: Arial;
                font-size: medium;
                margin-left:5px;
            }
            button{
                color:white;
                border:2px solid white;
                border-radius:10px;
                background-color: purple;
                margin-right: 0px;
                margin-left:100px;
                padding:5px;
                width:100px;
            }
        </style>
    </head>
    <body>
        <div class="layout">
            <div class="left-side">
            <p>Home</p>
            </div>
            <div class="center">
                <input class="search" type="text" placeholder="Search">
            </div>
            <div class="right-side">
                <button>download</button>
            </div>  <!-- There is a property flex-shrink:0; This mean the flex will not shrink-->
        </div>
    </body>
</html>
