<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: none;
  /* Here by fixing the list-style-type:none; we specify that the list has no marks like disk.
  And by setting padding=0; even if the list style type is not none like disc it will not showen in the webpage coz padding is 0.*/
   margin: 0;
  padding: 0;
  width: 200px;
  background-color: #f1f1f1;
}

li a {
  display: block;
  color: #000;
  padding: 8px 16px;
  text-decoration: none;/*It should be given or else it shows a underline.*/
}

/* Change the link color on hover */
li a:hover {
  background-color: #555;
  color: white;
}
</style>
</head>
<body>

<h2>Vertical Navigation Bar</h2>

<ul>
  <li><a href="#home">Home</a></li>
  <li><a href="#news">News</a></li>
  <li><a href="#contact">Contact</a></li>
  <li><a href="#about">About</a></li>
</ul>

</body>
</html>
