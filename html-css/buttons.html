<html>
  <head>
    <title>Buttons</title>
    <style>
      .first{
      background-color:black;
      border:none;
      color:white;
      margin:20px;
      height:40px;
      width: 100px;
      cursor:pointer;
      transition:opacity 0.2s;
      }
      .first:hover{
        opacity:0.5;
      }
      .second {
      background-color: yellow;
      color: black;
      border-radius:20px;
      border-color:white;
      border-style:solid;
      height: 40px;
      width: 110px;
      cursor: pointer;
      transition:background-color 0.2s;
    }
    .second:hover{
      background-color:orange;
    }
    .linkedin{
      background-color:rgb(88, 88, 231);
      color:white;
      border:none;
      height:40px;
      width:200px;
      margin-right:15px;
      border-radius:25px;
      font-weight:bold;
      cursor: pointer;
      transition:background-color 0.2s;
  
    }
    .linkedin:hover{
     background-color:rgb(6, 6, 108);
    }
    .save{
      color:rgb(60, 60, 249);
      background-color:white;
      font-weight:bold;
      font-size:medium;
      border-color:rgb(92, 92, 251);
      border-style:solid;
      border-width:1px;
      height:40px;
      width:100px;
      border-radius:25px;
      transition:border-width 0.1s,box-shadow 0.2s;
    }
    .save:hover{
      border-width:3px;
      box-shadow:7px 5px 10px rgba(81, 73, 73, 0.7);
    }
  </style>
  </head>
  <body>
    <button class="first">
      Request Now
    </button>
    <button class="second">Add to cart</button>
    <p>Linked In</p>
    <button class="linkedin">
      Apply on company website
    </button>
    <button class="save">
      Save
    </button>
  </body>
</html>
