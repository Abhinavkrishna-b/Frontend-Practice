<!DOCTYPE html>
<html>
    <head>
        <title>Neseted Layouts</title>
        <style>
            .horizontal-layout{
                display:inline-block;
                border:1px solid black;
            }
            .video{
                width:600px;
                height:350px;
                display:inline-block;

            }
            .vertical-layout{
                display:inline-block;
                border:1px solid red;
                width: 600px;
                height:200px;
                margin:0px 10px 10px 10px;
                padding-top : 70px;
                padding-left:50px;
            }
            .description{
                font-weight: bold;
                font-family: Arial;
            }
            .normal{
                color: rgb(157, 147, 147);
                opacity: 0.9;
            }
        </style>
    </head>
    <body>
        <div class="horizontal-layout">
            <img class="video" src="thumbnail-1.jpg" alt="Error">
            <div class="vertical-layout">
                <p class="description">Best Anime Recommandations  - Must Watch (2024)</p>
                <p class="normal">AnimeWatch</p>
                <p class="normal">2.3 Million views . 11 months ago</p>
            </div>
            </div>
            <div class="horizontal-layout">
                <img class="video"src="thumbnail-2.jpg" alt="Error">
                <div class="vertical-layout">
                <p class="description">Vinland Saga season-3 Updates (2025)</p>
                <p class="normal">Throffin</p>
                <p class="normal">5 Million views . 7 months ago</p>
                </div>
            </div>
            <div class="horizontal-layout">
                <img class="video"src="thumbnail-3.jpeg" alt="Error">
                <div class="vertical-layout">
                    <p class="description">GOAT Naruto - best anime i have ever watched</p>
                    <p class="normal">Anime</p>
                    <p class="normal">1.3 Million views . 3 months ago</p>
                </div>
            </div>
    </body>
</html>
