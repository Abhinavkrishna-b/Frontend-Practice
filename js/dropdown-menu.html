<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS dropdown-menu</title>
</head>
<body>
    <div style="margin:5px;background-color:grey;padding:5px; width: 50px;">
        <select name="dept" id="dept">

        </select>
    </div>
</body>
<script>
    let arr=['cse','it','ece'];
    let ip=document.getElementById("dept");
    for(let d of arr){
        let option = document.createElement('option');
        option.textContent = d; // Set text before appending
        
        option.value = d; // Set value attribute
        ip.appendChild(option);
    }
</script>
</html>
